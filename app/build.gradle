plugins {
    id 'java'
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
}

test {
    useJUnit()
}

application {
    mainClass = 'com.example.App'
}


jar {
    manifest {
        attributes 'Main-Class': 'com.example.App'
    }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}